name: Flutter Setup
description: Installs Flutter (version from .fvmrc), caches pub packages, and runs dart pub get.

runs:
  using: composite
  steps:
    - name: Read Flutter version from .fvmrc
      id: fvm
      shell: bash
      run: |
        FLUTTER_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('.fvmrc', 'utf8')).flutter")"
        echo "flutter_version=${FLUTTER_VERSION}" >> "$GITHUB_OUTPUT"

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ steps.fvm.outputs.flutter_version }}
        channel: 'stable'
        cache: true

    - name: SDK versions
      shell: bash
      run: |
        flutter --version
        dart --version

    - name: Cache pub packages
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('dart_cli/pubspec.yaml', '.fvmrc') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Install dependencies
      working-directory: dart_cli
      shell: bash
      run: |
        dart pub get
