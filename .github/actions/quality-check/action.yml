name: Quality Check
description: Run quality checks

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: ./.github/actions/node-setup

    - name: Check translations parity
      shell: bash
      run: node scripts/check-translations.mjs

    - name: Test automated review helpers
      shell: bash
      run: yarn test:reviewer

    - name: Lint Dart sources
      shell: bash
      run: yarn lint:dart

    - name: Lint GUI sources
      shell: bash
      run: |
        cd gui
        dart format -l 120 --set-exit-if-changed lib test
        flutter analyze

    - name: Run GUI tests
      shell: bash
      run: |
        cd gui
        flutter test

    - name: Run tests with coverage
      shell: bash
      run: yarn coverage:dart

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          dart_cli/coverage/lcov.info
          dart_cli/coverage/coverage_html.zip
        if-no-files-found: warn
        retention-days: 7
