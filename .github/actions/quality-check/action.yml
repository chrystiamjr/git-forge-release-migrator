name: Quality Check
description: Run quality checks

runs:
  using: composite
  steps:
    - name: Format check
      shell: bash
      working-directory: dart_cli
      run: dart format -l 120 --set-exit-if-changed bin lib test

    - name: Static analysis
      shell: bash
      working-directory: dart_cli
      run: dart analyze --fatal-infos

    - name: Run tests with coverage
      shell: bash
      working-directory: dart_cli
      run: dart test --coverage=coverage/

    - name: Generate LCOV report
      shell: bash
      working-directory: dart_cli
      run: dart run coverage:format_coverage --lcov --in=coverage/ --out=coverage/lcov.info --report-on=lib

    - name: Enforce coverage threshold
      shell: bash
      working-directory: dart_cli
      run: |
        set -euo pipefail
        LCOV="coverage/lcov.info"
        TOTAL=$(grep -c "^DA:" "$LCOV")
        COVERED=$(grep -cP "^DA:[0-9]+,[^0]" "$LCOV")
        PCT=$(( COVERED * 100 / TOTAL ))
        MIN=80
        echo "Coverage: ${PCT}% (${COVERED}/${TOTAL} lines, minimum ${MIN}%)"
        if [ "$PCT" -lt "$MIN" ]; then
          echo "::error::Coverage ${PCT}% is below the minimum threshold of ${MIN}%"
          exit 1
        fi

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: dart_cli/coverage/lcov.info
        if-no-files-found: warn
        retention-days: 7
