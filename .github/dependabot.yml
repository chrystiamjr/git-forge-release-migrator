version: 2

updates:
  - package-ecosystem: pub
    directory: /dart_cli
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      dart-dependencies:
        patterns:
          - '*'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      npm-dependencies:
        patterns:
          - '*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - '*'
