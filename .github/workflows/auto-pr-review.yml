name: Automated PR Review

on:
  workflow_run:
    workflows:
      - Quality Checks
    types:
      - completed

concurrency:
  group: auto-pr-review-${{ github.event.workflow_run.pull_requests[0].number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: read
    env:
      HAS_APP_REVIEW_CREDS: ${{ secrets.REVIEW_BOT_APP_ID != '' && secrets.REVIEW_BOT_APP_PRIVATE_KEY != '' }}
      HAS_BOT_TOKEN: ${{ secrets.GH_REVIEW_BOT_TOKEN != '' }}
      HAS_GH_TOKEN: ${{ secrets.GH_TOKEN != '' }}

    steps:
      - name: Resolve PR number
        id: pr
        run: |
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"
          if [[ -n "${PR_NUMBER}" ]]; then
            echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "No pull request is associated with this workflow_run."
          fi

      - name: Resolve checkout target
        id: checkout-target
        run: |
          REPOSITORY="${{ github.event.workflow_run.pull_requests[0].head.repo.full_name || github.repository }}"
          REF="${{ github.event.workflow_run.pull_requests[0].head.sha || github.event.repository.default_branch }}"

          echo "repository=${REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository context
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.checkout-target.outputs.repository }}
          ref: ${{ steps.checkout-target.outputs.ref }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Configure review result path
        run: echo "REVIEW_RESULT_PATH=${RUNNER_TEMP}/auto-pr-review.json" >> "$GITHUB_ENV"

      - name: Create GitHub App token
        id: app-token
        if: steps.pr.outputs.number != '' && env.HAS_APP_REVIEW_CREDS == 'true'
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.REVIEW_BOT_APP_ID }}
          private-key: ${{ secrets.REVIEW_BOT_APP_PRIVATE_KEY }}

      - name: Resolve review bot token
        id: review-token
        if: steps.pr.outputs.number != ''
        run: |
          if [[ -n "${{ steps.app-token.outputs.token }}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "identity=github_app" >> "$GITHUB_OUTPUT"
            echo "GH_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ "${HAS_BOT_TOKEN}" == "true" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "identity=bot_token" >> "$GITHUB_OUTPUT"
            echo "GH_TOKEN=${{ secrets.GH_REVIEW_BOT_TOKEN }}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ "${HAS_GH_TOKEN}" == "true" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "identity=gh_token" >> "$GITHUB_OUTPUT"
            echo "GH_TOKEN=${{ secrets.GH_TOKEN }}" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "configured=false" >> "$GITHUB_OUTPUT"

      - name: Skip when review bot credentials are missing
        if: steps.pr.outputs.number != '' && steps.review-token.outputs.configured != 'true'
        run: |
          echo "Automated PR review skipped because no review bot credentials were configured."
          echo "Configure REVIEW_BOT_APP_ID + REVIEW_BOT_APP_PRIVATE_KEY, GH_REVIEW_BOT_TOKEN, or GH_TOKEN."

      - name: Run automated review analysis
        if: steps.pr.outputs.number != '' && steps.review-token.outputs.configured == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: node scripts/review-pr.mjs

      - name: Ensure fallback review result exists
        if: always() && steps.pr.outputs.number != '' && steps.review-token.outputs.configured == 'true'
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REVIEW_RESULT_PATH: ${{ env.REVIEW_RESULT_PATH }}
        run: |
          if [[ -f "${REVIEW_RESULT_PATH}" ]]; then
            exit 0
          fi

          cat > "${REVIEW_RESULT_PATH}" <<EOF
          {
            "pr_number": ${PR_NUMBER},
            "verdict": "request_changes",
            "blocking_findings": 1,
            "non_blocking_findings": 0,
            "findings": [],
            "error": "Automated review analysis did not produce a result file.",
            "marker": "<!-- auto-pr-review -->"
          }
          EOF

      - name: Publish review verdict
        if: always() && steps.pr.outputs.number != '' && steps.review-token.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REVIEW_RESULT_PATH: ${{ env.REVIEW_RESULT_PATH }}
        run: node scripts/publish-pr-review.mjs

      - name: Fail job on blocking automated review verdict
        if: always() && steps.pr.outputs.number != '' && steps.review-token.outputs.configured == 'true'
        env:
          REVIEW_RESULT_PATH: ${{ env.REVIEW_RESULT_PATH }}
        run: |
          VERDICT="$(node -e "const fs=require('fs'); const p=process.env.REVIEW_RESULT_PATH; const r=JSON.parse(fs.readFileSync(p, 'utf8')); process.stdout.write(String(r.verdict || ''))")"
          if [[ "${VERDICT}" == "request_changes" ]]; then
            echo "Automated PR review found blocking issues."
            exit 1
          fi
