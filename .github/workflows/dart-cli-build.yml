name: Build CLI

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            bin_name: gfrm
            is_macos: false
          - runner: windows-latest
            platform: windows
            bin_name: gfrm.exe
            is_macos: false
          - runner: macos-15-intel
            platform: macos-intel
            bin_name: gfrm
            is_macos: true
            expected_arch: x86_64
          - runner: macos-15
            platform: macos-silicon
            bin_name: gfrm
            is_macos: true
            expected_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-setup

      - name: Compile binary
        working-directory: dart_cli
        shell: bash
        run: |
          mkdir -p build

          OUT="build/${{ matrix.platform }}/${{ matrix.bin_name }}"
          mkdir -p "$(dirname "$OUT")"

          dart compile exe bin/gfrm_dart.dart -o "$OUT"

          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "$OUT"
          fi

          echo "OUT=$OUT" >> "$GITHUB_ENV"
          echo "PLATFORM=${{ matrix.platform }}" >> "$GITHUB_ENV"

      - name: Validate macOS binary architecture
        if: matrix.is_macos
        working-directory: dart_cli
        shell: bash
        run: |
          FILE_OUTPUT="$(file "${OUT}")"
          echo "${FILE_OUTPUT}"
          if ! echo "${FILE_OUTPUT}" | grep -q "${{ matrix.expected_arch }}"; then
            echo "::error::Expected architecture ${{ matrix.expected_arch }} for ${{ matrix.platform }}, got: ${FILE_OUTPUT}"
            exit 1
          fi

      - name: Import macOS signing certificate (optional)
        if: matrix.is_macos
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "APPLE_CERTIFICATE_P12_BASE64/APPLE_CERTIFICATE_PASSWORD not configured; skipping certificate import."
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/apple-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/gfrm-build.keychain-db"
          KEYCHAIN_PASSWORD="${APPLE_KEYCHAIN_PASSWORD:-gfrm-temporary-keychain-password}"

          if ! printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          RESOLVED_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/"/ {print $2; exit}')"
          if [ -n "$RESOLVED_IDENTITY" ]; then
            echo "APPLE_SIGN_IDENTITY_RESOLVED=$RESOLVED_IDENTITY" >> "$GITHUB_ENV"
          fi
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Codesign macOS binary (optional)
        if: matrix.is_macos
        working-directory: dart_cli
        shell: bash
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          SIGN_IDENTITY="${APPLE_SIGN_IDENTITY:-$APPLE_SIGN_IDENTITY_RESOLVED}"
          if [ -z "$SIGN_IDENTITY" ]; then
            echo "No macOS signing identity configured; publishing unsigned macOS binary."
            exit 0
          fi

          codesign --force --timestamp --options runtime --sign "$SIGN_IDENTITY" "${OUT}"
          codesign --verify --verbose "${OUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gfrm-${{ env.PLATFORM }}
          path: dart_cli/${{ env.OUT }}

      - name: Run smoke test
        if: runner.os != 'Windows'
        working-directory: dart_cli
        shell: bash
        run: |
          "${OUT}" --help

      - name: Cleanup temporary macOS keychain
        if: matrix.is_macos && env.KEYCHAIN_PATH != ''
        shell: bash
        run: |
          security delete-keychain "${KEYCHAIN_PATH}" || true
