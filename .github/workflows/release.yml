name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-setup

      - uses: ./.github/actions/quality-check

  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: test-gate
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_git_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install release dependencies
        run: yarn install --immutable

      - name: Bootstrap pre-1.0 tag when no semver tag exists
        shell: bash
        run: |
          set -euo pipefail

          BOOTSTRAP_TAG="v0.0.0"
          git fetch --tags origin

          if git ls-remote --exit-code --tags origin "refs/tags/${BOOTSTRAP_TAG}" >/dev/null 2>&1; then
            echo "Bootstrap tag already exists on remote: ${BOOTSTRAP_TAG}"
            exit 0
          fi

          LAST_SEMVER_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=version:refname | tail -n 1)"
          if [ -n "${LAST_SEMVER_TAG}" ]; then
            echo "Semver tag already exists: ${LAST_SEMVER_TAG}"
            exit 0
          fi

          # Some PATs cannot create tags that point to commits changing workflow files.
          # Pick the earliest ancestor commit that does not touch .github/workflows.
          BOOTSTRAP_COMMIT="$(
            while read -r sha; do
              if ! git diff-tree -m --root --no-commit-id --name-only -r "${sha}" | grep -q '^\.github/workflows/'; then
                echo "${sha}"
                break
              fi
            done < <(git rev-list --topo-order --reverse HEAD)
          )"

          if [ -z "${BOOTSTRAP_COMMIT}" ]; then
            echo "Could not determine a bootstrap commit without workflow file changes."
            exit 1
          fi

          echo "Bootstrap commit selected: ${BOOTSTRAP_COMMIT}"

          if PUSH_OUTPUT="$(git push origin "${BOOTSTRAP_COMMIT}:refs/tags/${BOOTSTRAP_TAG}" 2>&1)"; then
            echo "${PUSH_OUTPUT}"
            echo "Bootstrap tag pushed: ${BOOTSTRAP_TAG}"
            git fetch origin "+refs/tags/${BOOTSTRAP_TAG}:refs/tags/${BOOTSTRAP_TAG}"
            exit 0
          fi

          echo "${PUSH_OUTPUT}"

          # Another concurrent run may have created the tag between our checks and push.
          git fetch --tags origin
          if git ls-remote --exit-code --tags origin "refs/tags/${BOOTSTRAP_TAG}" >/dev/null 2>&1; then
            echo "Bootstrap tag already exists after concurrent push; continuing."
            git fetch origin "+refs/tags/${BOOTSTRAP_TAG}:refs/tags/${BOOTSTRAP_TAG}"
            exit 0
          fi

          echo "Failed to create bootstrap tag ${BOOTSTRAP_TAG}"
          exit 1

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  build-release-assets:
    name: Build Release Asset (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    env:
      MACOS_RELEASE_SECURITY_MODE: ${{ vars.MACOS_RELEASE_SECURITY_MODE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux
            bin_name: gfrm
            archive_name: gfrm-linux.zip
            is_macos: false
          - runner: windows-latest
            platform: windows
            bin_name: gfrm.exe
            archive_name: gfrm-windows.zip
            is_macos: false
          - runner: macos-15-intel
            platform: macos-intel
            bin_name: gfrm
            archive_name: gfrm-macos-intel.zip
            is_macos: true
            expected_arch: x86_64
          - runner: macos-15
            platform: macos-silicon
            bin_name: gfrm
            archive_name: gfrm-macos-silicon.zip
            is_macos: true
            expected_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-setup

      - name: Compile binary
        working-directory: dart_cli
        shell: bash
        run: |
          mkdir -p build
          OUT="build/${{ matrix.platform }}/${{ matrix.bin_name }}"
          mkdir -p "$(dirname "$OUT")"

          dart compile exe bin/gfrm_dart.dart -o "$OUT"

          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "$OUT"
          fi

          echo "OUT=$OUT" >> "$GITHUB_ENV"
          echo "PLATFORM=${{ matrix.platform }}" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=${{ matrix.archive_name }}" >> "$GITHUB_ENV"

      - name: Validate macOS binary architecture
        if: matrix.is_macos
        working-directory: dart_cli
        shell: bash
        run: |
          FILE_OUTPUT="$(file "${OUT}")"
          echo "${FILE_OUTPUT}"
          if ! echo "${FILE_OUTPUT}" | grep -q "${{ matrix.expected_arch }}"; then
            echo "::error::Expected architecture ${{ matrix.expected_arch }} for ${{ matrix.platform }}, got: ${FILE_OUTPUT}"
            exit 1
          fi

      - name: Import macOS signing certificate (optional)
        if: matrix.is_macos
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          SECURITY_MODE="${MACOS_RELEASE_SECURITY_MODE:-permissive}"
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            if [ "$SECURITY_MODE" = "strict" ]; then
              echo "::error::Missing APPLE_CERTIFICATE_P12_BASE64/APPLE_CERTIFICATE_PASSWORD in strict mode."
              exit 1
            fi
            echo "::warning::APPLE_CERTIFICATE_P12_BASE64/APPLE_CERTIFICATE_PASSWORD not configured; skipping certificate import."
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/apple-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/gfrm-build.keychain-db"
          KEYCHAIN_PASSWORD="${APPLE_KEYCHAIN_PASSWORD:-gfrm-temporary-keychain-password}"

          if ! printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          RESOLVED_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/"/ {print $2; exit}')"
          if [ -n "$RESOLVED_IDENTITY" ]; then
            echo "APPLE_SIGN_IDENTITY_RESOLVED=$RESOLVED_IDENTITY" >> "$GITHUB_ENV"
          fi
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Codesign macOS binary (optional)
        if: matrix.is_macos
        working-directory: dart_cli
        shell: bash
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          SECURITY_MODE="${MACOS_RELEASE_SECURITY_MODE:-permissive}"
          SIGN_IDENTITY="${APPLE_SIGN_IDENTITY:-$APPLE_SIGN_IDENTITY_RESOLVED}"
          if [ -z "$SIGN_IDENTITY" ]; then
            if [ "$SECURITY_MODE" = "strict" ]; then
              echo "::error::Missing APPLE_SIGN_IDENTITY (or resolvable identity) in strict mode."
              exit 1
            fi
            echo "::warning::No macOS signing identity configured; publishing unsigned macOS binary."
            exit 0
          fi

          codesign --force --timestamp --options runtime --sign "$SIGN_IDENTITY" "${OUT}"
          codesign --verify --verbose "${OUT}"
          echo "MACOS_BINARY_SIGNED=1" >> "$GITHUB_ENV"

      - name: Create archive (macOS/Linux)
        if: runner.os != 'Windows'
        working-directory: dart_cli
        shell: bash
        run: |
          zip -j "$ARCHIVE_NAME" "$OUT"

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "dart_cli/$env:ARCHIVE_NAME") {
            Remove-Item "dart_cli/$env:ARCHIVE_NAME" -Force
          }

          $stagingDir = Join-Path $env:RUNNER_TEMP "gfrm-release"
          if (Test-Path $stagingDir) {
            Remove-Item $stagingDir -Recurse -Force
          }
          New-Item -Path $stagingDir -ItemType Directory | Out-Null
          Copy-Item "dart_cli/$env:OUT" (Join-Path $stagingDir "gfrm.exe") -Force
          Compress-Archive -Path (Join-Path $stagingDir "gfrm.exe") -DestinationPath "dart_cli/$env:ARCHIVE_NAME" -Force

      - name: Notarize macOS archive (optional)
        if: matrix.is_macos
        working-directory: dart_cli
        shell: bash
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_API_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_BASE64 }}
        run: |
          SECURITY_MODE="${MACOS_RELEASE_SECURITY_MODE:-permissive}"

          if [ "${MACOS_BINARY_SIGNED:-0}" != "1" ]; then
            if [ "$SECURITY_MODE" = "strict" ]; then
              echo "::error::Binary is not signed; notarization is required in strict mode."
              exit 1
            fi
            echo "::warning::Skipping notarization because binary was not signed."
            exit 0
          fi

          USE_API_KEY=0
          USE_APPLE_ID=0
          if [ -n "${APPLE_NOTARY_KEY_ID}" ] && [ -n "${APPLE_NOTARY_ISSUER_ID}" ] && [ -n "${APPLE_NOTARY_API_KEY_P8_BASE64}" ]; then
            USE_API_KEY=1
          elif [ -n "${APPLE_NOTARY_APPLE_ID}" ] && [ -n "${APPLE_NOTARY_TEAM_ID}" ] && [ -n "${APPLE_NOTARY_APP_PASSWORD}" ]; then
            USE_APPLE_ID=1
          fi

          if [ "$USE_API_KEY" = "0" ] && [ "$USE_APPLE_ID" = "0" ]; then
            if [ "$SECURITY_MODE" = "strict" ]; then
              echo "::error::Missing notarization credentials in strict mode."
              exit 1
            fi
            echo "::warning::No notarization credentials configured; skipping notarization."
            exit 0
          fi

          if [ "$USE_API_KEY" = "1" ]; then
            KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
            if ! printf '%s' "$APPLE_NOTARY_API_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH" 2>/dev/null; then
              printf '%s' "$APPLE_NOTARY_API_KEY_P8_BASE64" | base64 -D > "$KEY_PATH"
            fi
            xcrun notarytool submit "$ARCHIVE_NAME" \
              --key "$KEY_PATH" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --issuer "$APPLE_NOTARY_ISSUER_ID" \
              --wait
          else
            xcrun notarytool submit "$ARCHIVE_NAME" \
              --apple-id "$APPLE_NOTARY_APPLE_ID" \
              --password "$APPLE_NOTARY_APP_PASSWORD" \
              --team-id "$APPLE_NOTARY_TEAM_ID" \
              --wait
          fi

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ env.PLATFORM }}
          path: dart_cli/${{ env.ARCHIVE_NAME }}

      - name: Cleanup temporary macOS keychain
        if: matrix.is_macos && env.KEYCHAIN_PATH
        shell: bash
        run: |
          security delete-keychain "${KEYCHAIN_PATH}" || true

  upload-release-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [semantic-release, build-release-assets]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Download built archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-asset-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd release-assets
          sha256sum *.zip > checksums-sha256.txt

      - name: Upload archives and checksums to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_TAG: ${{ needs.semantic-release.outputs.new_release_git_tag }}
        run: |
          ls -la release-assets
          gh release upload "$RELEASE_TAG" release-assets/* --repo "${{ github.repository }}" --clobber
