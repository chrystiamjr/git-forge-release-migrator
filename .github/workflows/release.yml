name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  test-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-setup

      - uses: ./.github/actions/quality-check

  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: test-gate
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_git_tag: ${{ steps.semantic.outputs.new_release_git_tag }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Get Yarn cache directory
        id: yarn-cache-dir
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install release dependencies
        run: yarn install --immutable

      - name: Bootstrap pre-1.0 tag when no semver tag exists
        shell: bash
        run: |
          set -euo pipefail

          BOOTSTRAP_TAG="v0.0.0"
          git fetch --tags origin

          if git ls-remote --exit-code --tags origin "refs/tags/${BOOTSTRAP_TAG}" >/dev/null 2>&1; then
            echo "Bootstrap tag already exists on remote: ${BOOTSTRAP_TAG}"
            exit 0
          fi

          LAST_SEMVER_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=version:refname | tail -n 1)"
          if [ -n "${LAST_SEMVER_TAG}" ]; then
            echo "Semver tag already exists: ${LAST_SEMVER_TAG}"
            exit 0
          fi

          # Some PATs cannot create tags that point to commits changing workflow files.
          # Pick the earliest ancestor commit that does not touch .github/workflows.
          BOOTSTRAP_COMMIT="$(git rev-list --reverse HEAD | while read -r sha; do
            if ! git diff-tree --root --no-commit-id --name-only -r "${sha}" | grep -q '^\.github/workflows/'; then
              echo "${sha}"
              break
            fi
          done)"

          if [ -z "${BOOTSTRAP_COMMIT}" ]; then
            echo "Could not determine a bootstrap commit without workflow file changes."
            exit 1
          fi

          echo "Bootstrap commit selected: ${BOOTSTRAP_COMMIT}"
          git tag -a "${BOOTSTRAP_TAG}" "${BOOTSTRAP_COMMIT}" -m "chore(release): bootstrap pre-1.0 tag"

          if PUSH_OUTPUT="$(git push origin "refs/tags/${BOOTSTRAP_TAG}" 2>&1)"; then
            echo "${PUSH_OUTPUT}"
            echo "Bootstrap tag pushed: ${BOOTSTRAP_TAG}"
            exit 0
          fi

          echo "${PUSH_OUTPUT}"

          # Another concurrent run may have created the tag between our checks and push.
          git fetch --tags origin
          if git ls-remote --exit-code --tags origin "refs/tags/${BOOTSTRAP_TAG}" >/dev/null 2>&1; then
            echo "Bootstrap tag already exists after concurrent push; continuing."
            exit 0
          fi

          echo "Failed to create bootstrap tag ${BOOTSTRAP_TAG}"
          exit 1

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 24
          extends: ./scripts/release.config.cjs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  build-release-assets:
    name: Build Release Asset (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/flutter-setup

      - name: Compile binary
        working-directory: dart_cli
        shell: bash
        run: |
          mkdir -p build
          if [ "${{ runner.os }}" = "Windows" ]; then
            PLATFORM="windows"
            BIN_NAME="gfrm.exe"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            PLATFORM="macos"
            BIN_NAME="gfrm"
          else
            PLATFORM="linux"
            BIN_NAME="gfrm"
          fi

          OUT="build/${PLATFORM}/${BIN_NAME}"
          mkdir -p "$(dirname "$OUT")"

          dart compile exe bin/gfrm_dart.dart -o "$OUT"

          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "$OUT"
          fi

          echo "OUT=$OUT" >> "$GITHUB_ENV"
          echo "PLATFORM=$PLATFORM" >> "$GITHUB_ENV"

      - name: Import macOS signing certificate (optional)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "APPLE_CERTIFICATE_P12_BASE64/APPLE_CERTIFICATE_PASSWORD not configured; skipping certificate import."
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/apple-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/gfrm-build.keychain-db"
          KEYCHAIN_PASSWORD="${APPLE_KEYCHAIN_PASSWORD:-gfrm-temporary-keychain-password}"

          if ! printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          RESOLVED_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F'"' '/"/ {print $2; exit}')"
          if [ -n "$RESOLVED_IDENTITY" ]; then
            echo "APPLE_SIGN_IDENTITY_RESOLVED=$RESOLVED_IDENTITY" >> "$GITHUB_ENV"
          fi
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Codesign macOS binary (optional)
        if: runner.os == 'macOS'
        working-directory: dart_cli
        shell: bash
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: |
          SIGN_IDENTITY="${APPLE_SIGN_IDENTITY:-$APPLE_SIGN_IDENTITY_RESOLVED}"
          if [ -z "$SIGN_IDENTITY" ]; then
            echo "No macOS signing identity configured; publishing unsigned macOS binary."
            exit 0
          fi

          codesign --force --timestamp --options runtime --sign "$SIGN_IDENTITY" "${OUT}"
          codesign --verify --verbose "${OUT}"

      - name: Create archive (macOS/Linux)
        if: runner.os != 'Windows'
        working-directory: dart_cli
        shell: bash
        run: |
          ARCHIVE_NAME="gfrm-${PLATFORM}.zip"
          zip -j "$ARCHIVE_NAME" "$OUT"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveName = "gfrm-windows.zip"
          if (Test-Path "dart_cli/$archiveName") {
            Remove-Item "dart_cli/$archiveName" -Force
          }

          $stagingDir = Join-Path $env:RUNNER_TEMP "gfrm-release"
          if (Test-Path $stagingDir) {
            Remove-Item $stagingDir -Recurse -Force
          }
          New-Item -Path $stagingDir -ItemType Directory | Out-Null
          Copy-Item "dart_cli/$env:OUT" (Join-Path $stagingDir "gfrm.exe") -Force
          Compress-Archive -Path (Join-Path $stagingDir "gfrm.exe") -DestinationPath "dart_cli/$archiveName" -Force

          "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ env.PLATFORM }}
          path: dart_cli/${{ env.ARCHIVE_NAME }}

      - name: Cleanup temporary macOS keychain
        if: runner.os == 'macOS' && env.KEYCHAIN_PATH
        shell: bash
        run: |
          security delete-keychain "${KEYCHAIN_PATH}" || true

  upload-release-assets:
    name: Upload Release Assets
    runs-on: ubuntu-latest
    needs: [semantic-release, build-release-assets]
    if: needs.semantic-release.outputs.new_release_published == 'true'
    steps:
      - name: Download built archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-asset-*
          merge-multiple: true

      - name: Upload archives to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_TAG: ${{ needs.semantic-release.outputs.new_release_git_tag }}
        run: |
          ls -la release-assets
          gh release upload "$RELEASE_TAG" release-assets/* --repo "${{ github.repository }}" --clobber
